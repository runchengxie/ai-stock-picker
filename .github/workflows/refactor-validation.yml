name: Final refactor validation

on:
  pull_request:
    branches: [codex/rename-package-contracts]

permissions:
  contents: read

concurrency:
  group: final-refactor-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install supported Python versions
        run: uv python install 3.10 3.12

      - name: Install locked development environment
        run: uv sync --locked --group dev

      - name: Run all validation commands and capture logs
        shell: bash
        run: |
          mkdir -p validation-logs
          failures=0
          run_check() {
            name="$1"
            shift
            set +e
            "$@" >"validation-logs/$name.txt" 2>&1
            status=$?
            set -e
            echo "$status" >"validation-logs/$name.status"
            if [[ $status -ne 0 ]]; then failures=$((failures + 1)); fi
          }
          run_check lock uv lock --check
          run_check ruff-lint uv run ruff check .
          run_check ruff-format uv run ruff format --check .
          run_check ty uv run ty check
          run_check pytest uv run pytest
          run_check coverage-ratchet uv run python scripts/dev/coverage_ratchet.py
          run_check maintainability uv run python scripts/dev/maintainability_metrics.py --ratchet
          run_check build uv run python -m build
          run_check whitespace git diff --check
          for version in 3.10 3.12; do
            venv="$RUNNER_TEMP/wheel-$version"
            run_check "venv-$version" uv venv --python "$version" "$venv"
            run_check "wheel-install-$version" uv pip install --python "$venv/bin/python" dist/*.whl
            run_check "help-$version" "$venv/bin/aipick" --help
            run_check "us-dry-run-$version" "$venv/bin/aipick" pick \
              --candidates "$GITHUB_WORKSPACE/examples/us_candidates.json" \
              --as-of 2026-07-15 --top-n 1 --style quality \
              --response-language en --provider deepseek --dry-run
            run_check "cn-dry-run-$version" "$venv/bin/aipick" pick \
              --candidates "$GITHUB_WORKSPACE/examples/cn_candidates.json" \
              --as-of 2026-07-15 --top-n 1 --style quality \
              --response-language zh-CN --provider gemini --dry-run
          done
          echo "$failures" > validation-logs/failures.count

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-refactor-validation-logs
          path: validation-logs

      - name: Require all checks to pass
        shell: bash
        run: |
          failures=$(cat validation-logs/failures.count)
          if [[ "$failures" != "0" ]]; then
            echo "$failures validation command(s) failed"
            exit 1
          fi
