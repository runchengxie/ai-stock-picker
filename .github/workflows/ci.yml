name: Tooling migration validation

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: tooling-migration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Refresh dependency lock
        run: uv lock

      - name: Commit refreshed lock
        shell: bash
        run: |
          if git diff --quiet -- uv.lock; then
            exit 0
          fi
          git config user.name "tooling-migration-bot"
          git config user.email "tooling-migration-bot@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: refresh dependency lock"
          git push

      - name: Install locked dependencies
        run: uv sync --locked --group dev

      - name: Check dependency lock
        run: uv lock --check

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: ty
        run: uv run ty check

      - name: Tests
        run: uv run pytest

      - name: Maintainability
        run: uv run python scripts/dev/maintainability_metrics.py --ratchet

      - name: Build
        run: uv run python -m build

      - name: Check whitespace
        run: git diff --check
