repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --frozen ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: uv run --frozen ruff format --check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run --frozen mypy
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest with coverage gate
        entry: uv run --frozen pytest
        language: system
        pass_filenames: false
