[project]
name = "ai-stock-picker"
version = "0.1.0"
requires-python = ">=3.10, <3.13"

dependencies = [
  "pandas",
  "matplotlib",
  "openpyxl",
  "scipy",
  "backtrader",
  "python-dotenv",
  "requests",
  "google-generativeai",
  "longport>=0.2.77",
  "pyyaml",
  "pydantic>=2",
]

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-cov",
  "ruff>=0.5",
  "mypy>=1.10",
  "pre-commit",
]

[project.optional-dependencies]
cli = ["rich>=13"]

[project.scripts]
aipick = "stock_analysis.app.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["stock_analysis*"]

[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
# Select rule sets to enable.
# "E", "F" correspond to Flake8's native rules.
# "I" corresponds to isort.
# "UP" corresponds to pyupgrade.
select = ["E", "F", "I", "UP", "B"] # B is flake8-bugbear

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E501"]
"project_tools/*" = ["E501"]
"src/stock_analysis/ai_lab/selection/ai_stock_pick.py" = ["E501"]
"src/stock_analysis/app/commands/__init__.py" = ["F401", "E402"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true

[tool.coverage.run]
source = ["src/stock_analysis"]

[tool.coverage.report]
show_missing = true

[tool.pytest.ini_options]
markers = [
  "unit: fast, isolated tests",
  "integration: tests that touch external APIs or DB",
  "e2e: end-to-end workflow tests",
  "slow: long-running tests",
  "requires_api: needs external API access",
  "requires_db: needs database access",
]
